version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies...

      # unzip をインストール
      - yum install -y unzip

      # Terraform をダウンロード（失敗時は停止）
      - curl -fLO https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip

      # ダウンロード確認（デバッグ用）
      - ls -l

      # 解凍（-o で上書き許可）
      - unzip -o terraform_1.6.6_linux_amd64.zip

      # 実行パスに配置
      - mv terraform /usr/local/bin/

      # Terraform のバージョン確認
      - terraform version

  pre_build:
    commands:
      - echo Pre-build phase...
      - cd ec2
      - terraform init
      - terraform validate

  build:
    commands:
      - echo Build phase...
      - terraform plan -out=tfplan
      - terraform apply -auto-approve tfplan

      # ===== Ansible 部分（未実装のため一時的にコメントアウト）=====
      # - terraform output -json > ../ansible/outputs.json
      # - cd ../ansible
      # - python3 generate_inventory.py
      # - ansible-playbook -i inventory/hosts playbooks/main.yml

  post_build:
    commands:
      - echo Post-build phase...