---
- name: Install dependencies
  hosts: dbservers
  become: yes
  gather_facts: false
  tasks:
    - name: Ensure Python 3 and pip are installed on the remote host
      yum:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install boto3 and botocore using the remote Python interpreter
      command: "{{ ansible_python_interpreter }} -m pip install boto3 botocore"

- name: Common services for all servers
  hosts: dbservers
  become: yes
  gather_facts: true

  vars:
    ansible_python_interpreter: /usr/bin/python3.9

  roles:
    - common