---
- name: Install dependencies
  hosts: dbservers
  become: yes
  gather_facts: false
  tasks:
    - name: Ensure Python 3 and pip are installed on the remote host
      yum:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install boto3 and botocore using pip3.9
      command: /usr/bin/pip3.9 install boto3 botocore
      args:
        creates: /usr/lib/python3.9/site-packages/boto3

- name: Common services for all servers
  hosts: dbservers
  become: yes
  gather_facts: true

  vars:
    ansible_python_interpreter: /usr/bin/python3.9

  roles:
    - common