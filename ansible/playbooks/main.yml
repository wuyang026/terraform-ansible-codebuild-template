---
- name: Install dependencies
  hosts: dbservers
  become: yes
  gather_facts: false
  tasks:
    - name: Ensure Python 3 and Boto3 are installed on the remote host
      yum:
        name:
          - python3
          - python3-pip
          - python3-boto3
        state: present

- name: Common services for all servers
  hosts: dbservers
  become: yes
  gather_facts: true

  vars:
    ansible_python_interpreter: /usr/bin/python3.9

  roles:
    - common