- name: SSM base test
  hosts: dbservers
  gather_facts: no
  vars:
    ansible_connection: amazon.aws.aws_ssm
    ansible_aws_ssm_bucket_name: "{{ lookup('env', 'S3_BUCKET') | default('go-s3-bucket-test', true) }}"
    ansible_aws_ssm_region: "{{ lookup('env', 'AWS_REGION') | default('ap-south-1', true) }}"
    ansible_aws_ssm_timeout: 120
    ansible_aws_ssm_s3_addressing_style: virtual
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: test connection
      raw: echo "SSM connected"

    - name: python check
      raw: python3 --version || echo "no python3"