---
# ==========================================
# Play 1: Pythonブートストラップ
# （Pythonが無い環境でも動作させるため）
# ==========================================
- name: Bootstrap Python
  hosts: dbservers
  gather_facts: no

  tasks:
    # Python3が存在しない場合のみインストール
    - name: Ensure python3 exists
      raw: |
        command -v python3 || yum install -y python3

# ==========================================
# Play 2: 共通設定適用
# ==========================================
- name: Common configuration
  hosts: dbservers
  become: yes
  gather_facts: yes

  roles:
    - common