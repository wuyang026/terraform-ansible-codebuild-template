---
# ===============================
# ① Bootstrap（Python + boto3）
# ===============================
- name: Bootstrap Python and boto3
  hosts: dbservers
  gather_facts: no
  tasks:
    - name: Install python3 if not exists
      raw: |
        if ! command -v python3 >/dev/null 2>&1; then
          yum install -y python3
        fi

    - name: Install boto3
      raw: |
        python3 -m ensurepip || true
        python3 -m pip install --upgrade pip
        python3 -m pip install boto3

# ===============================
# ② 共通サービス設定
# ===============================
- name: Common configuration
  hosts: dbservers
  become: yes
  gather_facts: yes

  tasks:
    # --- SELinux 無効化 ---
    - name: Disable SELinux immediately for RHEL 9
      ansible.posix.selinux:
        policy: targeted
        state: disabled
        immediate: yes
      when: ansible_os_family == "RedHat"

    # --- firewalld 停止 ---
    - name: Disable firewalld for RHEL 9
      ansible.builtin.systemd:
        name: firewalld
        state: stopped
        enabled: no
      when: ansible_os_family == "RedHat"

    # --- SSM Agent 起動 ---
    - name: Ensure Amazon SSM Agent is enabled and started
      ansible.builtin.service:
        name: amazon-ssm-agent
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"