---
# ==========================================
# 共通設定（すべてのサーバーに適用）
# ※ここでは「taskのみ」記述すること！
# ==========================================

# SELinuxを無効化（RHEL系のみ）
- name: Disable SELinux
  ansible.posix.selinux:
    policy: targeted
    state: disabled
    immediate: yes
  when: ansible_os_family == "RedHat"

# firewalldを停止
- name: Disable firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: no
  when: ansible_os_family == "RedHat"

# SSM Agentを起動・有効化
- name: Ensure SSM Agent is running
  ansible.builtin.service:
    name: amazon-ssm-agent
    state: started
    enabled: yes