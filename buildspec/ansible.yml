version: 0.2

env:
  variables:
    S3_BUCKET: "go-s3-bucket-test"

phases:
  install:
    commands:
      - echo "===== install ====="

      - yum update -y --allowerasing
      - yum install -y python3 python3-pip ansible awscli unzip curl --allowerasing

      - /usr/bin/python3.9 -m pip install boto3 botocore

      # SSM plugin
      - curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm" -o /tmp/plugin.rpm
      - yum install -y /tmp/plugin.rpm

      # Ansible collections
      - ansible-galaxy collection install amazon.aws community.aws

      # ansible.cfg
      - |
        cat > ansible.cfg << 'EOF'
        [defaults]
        inventory = inventory/hosts
        interpreter_python = auto_silent
        host_key_checking = False
        stdout_callback = yaml
        timeout = 60
        EOF

  pre_build:
    commands:
      - aws s3 cp s3://$S3_BUCKET/ansible-outputs.json ansible/outputs.json

  build:
    commands:
      - cd ansible
      - export ANSIBLE_CONFIG=../ansible.cfg
      - export AWS_REGION=${AWS_REGION:-ap-south-1}
      - export AWS_DEFAULT_REGION=${AWS_REGION:-ap-south-1}

      - python3 generate_inventory.py

      - ansible-inventory -i inventory/hosts --list

      - ansible-playbook -i inventory/hosts playbooks/main.yml -vvvv

  post_build:
    commands:
      - echo "done"