version: 0.2

env:
  variables:
    # SSM用S3バケット
    S3_BUCKET: "go-s3-bucket-test"

phases:
  install:
    commands:
      - echo "===== install フェーズ ====="

      # 基本パッケージ
      - yum update -y --allowerasing
      - yum install -y python3 python3-pip ansible awscli unzip curl --allowerasing

      # AWS SDK
      - pip3 install boto3 botocore

      # SSMプラグイン
      - curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm" -o /tmp/session-manager-plugin.rpm
      - yum install -y /tmp/session-manager-plugin.rpm

      # 確認
      - which session-manager-plugin

      # Ansible AWSコレクション
      - ansible-galaxy collection install amazon.aws community.aws

      # バージョン確認
      - ansible --version
      - python3 --version

      # ansible.cfg生成
      - |
        cat > ansible.cfg << 'EOF'
        [defaults]
        inventory = inventory/hosts
        roles_path = playbooks/roles
        interpreter_python = /usr/bin/python3
        host_key_checking = False
        stdout_callback = yaml

        [inventory]
        enable_plugins = host_list, script, yaml, ini, auto
        EOF

  pre_build:
    commands:
      - echo "===== pre_build フェーズ ====="

      # Terraform出力取得
      - aws s3 cp s3://$S3_BUCKET/ansible-outputs.json ansible/outputs.json --region $AWS_REGION

  build:
    commands:
      - echo "===== build フェーズ ====="

      - cd ansible

      # inventory生成
      - python3 generate_inventory.py

      # 環境変数設定
      - export ANSIBLE_AWS_SSM_S3_BUCKET=$S3_BUCKET
      - export ANSIBLE_AWS_SSM_REGION=$AWS_REGION
      - export AWS_DEFAULT_REGION=$AWS_REGION

      # 接続テスト
      - ansible dbservers -m ping -vvvv

      # playbook実行
      - ansible-playbook playbooks/main.yml -vvvv

  post_build:
    commands:
      - echo "===== 完了 ====="

artifacts:
  files:
    - ansible/inventory/hosts