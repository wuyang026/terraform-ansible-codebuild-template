version: 0.2

env:
  variables:
    S3_BUCKET: "go-s3-bucket-test"

phases:
  install:
    commands:
      - echo "===== install ====="

      - yum update -y --allowerasing
      - yum install -y python3 python3-pip ansible awscli unzip curl --allowerasing

      - /usr/bin/python3.9 -m pip install boto3 botocore
      - /usr/bin/python3.9 -c "import boto3, botocore"

      # SSM plugin
      - curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm" -o /tmp/plugin.rpm
      - yum install -y /tmp/plugin.rpm

      # aws_ssm の古い collection は bracketed paste の制御文字を除去できず、
      # remote_tmp 解決が壊れるため CodeBuild で明示的に上書きする
      - ansible-galaxy collection install amazon.aws:==10.3.0 community.aws:==10.1.0 --force
      - ansible-galaxy collection list | egrep 'amazon\.aws|community\.aws'

      - mkdir -p /tmp/.ansible/localtmp

      # ansible.cfg
      - |
        cat > ansible.cfg << 'EOF'
        [defaults]
        inventory = inventory/hosts
        interpreter_python = auto_silent
        host_key_checking = False
        stdout_callback = yaml
        timeout = 60
        remote_tmp = /tmp/.ansible/tmp
        local_tmp = /tmp/.ansible/localtmp
        EOF

  build:
    commands:
      - cd ansible
      - export ANSIBLE_CONFIG=../ansible.cfg
      - export ANSIBLE_REMOTE_TEMP=/tmp/.ansible/tmp
      - export ANSIBLE_REMOTE_TMP=/tmp/.ansible/tmp
      - export ANSIBLE_LOCAL_TEMP=/tmp/.ansible/localtmp
      - export AWS_REGION=${AWS_REGION:-ap-south-1}
      - export AWS_DEFAULT_REGION=${AWS_REGION:-ap-south-1}

      - /usr/bin/python3.9 generate_inventory.py

      - /usr/bin/python3.9 /usr/bin/ansible-config dump --only-changed
      - /usr/bin/python3.9 /usr/bin/ansible-inventory -i inventory/hosts --list

      - /usr/bin/python3.9 /usr/bin/ansible-playbook -i inventory/hosts playbooks/main.yml

  post_build:
    commands:
      - echo "done"