version: 0.2

env:
  variables:
    S3_BUCKET: "go-s3-bucket-test"

phases:
  install:
    commands:
      - yum update -y --allowerasing
      - yum install -y python3 python3-pip ansible --allowerasing
      - pip3 install boto3 botocore
      - ansible-galaxy collection install amazon.aws
      - ansible --version
      - python3 --version
      - |
        cat > ansible.cfg << EOF
        [defaults]
        inventory = inventory/hosts
        roles_path = playbooks/roles
        host_key_checking = False

        [inventory]
        enable_plugins = aws_ec2, host_list, script, yaml, ini, auto

        [ssh_connection]
        ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
        EOF

  pre_build:
    commands:
      - aws s3 cp s3://$S3_BUCKET/ansible-outputs.json ansible/outputs.json --region $AWS_REGION

  build:
    commands:
      - cd ansible
      - python3 generate_inventory.py
      - ansible-playbook -i inventory/hosts playbooks/main.yml

  post_build:
    commands:
      - echo "Ansible execution completed"

artifacts:
  files:
    - ansible/inventory/hosts